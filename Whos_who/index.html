<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Who's Who Scouting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ── HZRDUS Design System v2 — embedded ─── */
:root {
  --color-ground:        #F4F2EE;
  --color-surface:       #ECEAE5;
  --color-sunken:        #E2DFD8;
  --color-border:        #C8C4BB;
  --color-border-strong: #A09A90;
  --color-ink:           #1A1714;
  --color-ink-soft:      #3D3830;
  --color-ink-muted:     #6B6157;
  --color-ink-faint:     #9A9189;
  --color-gold:          #8A6410;
  --color-gold-mid:      #A67C1A;
  --color-gold-bright:   #C9A84C;
  --color-gold-tint:     #F5EDD6;
  --color-gold-border:   #C9A84C;
  --color-reversed-bg:   #1A1714;
  --color-reversed-text: #F4F2EE;
  --color-reversed-muted:#9A9189;
  --color-danger:        #B01E24;
  --color-info:          #0076A3;
  --color-success:       #2E7D32;
  --color-bcc-accent:    #0076A3;  /* BCC team highlight — blue */

  --font-display: 'Barlow Condensed', Impact, 'Arial Narrow', sans-serif;
  --font-body:    'Barlow', 'Helvetica Neue', Helvetica, sans-serif;

  --text-xs:   0.8125rem;
  --text-sm:   0.9375rem;
  --text-base: 1.0625rem;
  --text-md:   1.1875rem;
  --text-lg:   1.375rem;
  --text-xl:   1.75rem;
  --text-2xl:  2.25rem;
  --text-3xl:  3rem;

  --weight-regular:  400;
  --weight-semibold: 600;
  --weight-bold:     700;
  --weight-black:    900;

  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.5rem;
  --space-6: 2rem;

  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;

  --shadow-sm: 0 1px 3px rgba(26,23,20,0.10);
  --shadow-md: 0 3px 10px rgba(26,23,20,0.14);
  --transition-base: 180ms cubic-bezier(0.25,0,0,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  background: var(--color-ground);
  color: var(--color-ink);
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: 1.5;
  min-height: 100vh;
  overscroll-behavior: none;
}

/* ── App Shell ─────────────────────────────── */
.view { display: none; min-height: 100vh; }
.view.active { display: block; }

/* ── Header / Nav ──────────────────────────── */
.app-header {
  background: var(--color-reversed-bg);
  padding: var(--space-3) var(--space-4);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  position: sticky;
  top: 0;
  z-index: 100;
  min-height: 52px;
}
.back-btn {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-family: var(--font-display);
  font-size: var(--text-md);
  font-weight: var(--weight-black);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-ink);
  background: var(--color-gold-bright);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  padding: var(--space-2) var(--space-3);
  min-height: 40px;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
  flex-shrink: 0;
}
.back-btn:active { opacity: 0.75; transform: scale(0.97); }
.back-chevron { font-size: 1.3em; line-height: 1; }
.header-title {
  font-family: var(--font-display);
  font-size: var(--text-md);
  font-weight: var(--weight-black);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--color-reversed-text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Hero / Wordmark ───────────────────────── */
.app-wordmark {
  background: var(--color-reversed-bg);
  padding: var(--space-5) var(--space-4) var(--space-4);
  text-align: left;
  border-bottom: 2px solid var(--color-gold-border);
}
.wordmark-eyebrow {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--color-gold-bright);
  margin-bottom: var(--space-1);
}
.wordmark-title {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-black);
  letter-spacing: -0.02em;
  line-height: 0.95;
  text-transform: uppercase;
  color: var(--color-reversed-text);
}
.wordmark-sub {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-reversed-muted);
  margin-top: var(--space-2);
}

/* ── Content Padding ───────────────────────── */
.content { padding: var(--space-4); }

/* ── Block Buttons (team/section nav) ──────── */
.block-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-4) var(--space-5);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all var(--transition-base);
  margin-bottom: var(--space-3);
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
}
.block-btn::after {
  content: '›';
  position: absolute;
  right: var(--space-4);
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.5rem;
  color: var(--color-ink-muted);
  font-family: var(--font-display);
}
.block-btn:active {
  background: var(--color-sunken);
  transform: scale(0.98);
}
.block-btn__label {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: var(--weight-black);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--color-ink);
  line-height: 1.1;
}
.block-btn__sub {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-ink-muted);
  margin-top: 2px;
}

/* BCC team button — blue accent */
.block-btn--bcc {
  border-left: 4px solid var(--color-bcc-accent);
  background: #EBF4FA;
}
.block-btn--bcc .block-btn__label { color: var(--color-bcc-accent); }

/* Section buttons (BATTERS / PITCHERS) */
.section-btn {
  display: block;
  width: 100%;
  background: var(--color-reversed-bg);
  border: none;
  border-radius: var(--radius-md);
  padding: var(--space-5) var(--space-5);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all var(--transition-base);
  margin-bottom: var(--space-3);
  text-align: left;
  position: relative;
  overflow: hidden;
}
.section-btn::after {
  content: '›';
  position: absolute;
  right: var(--space-5);
  top: 50%;
  transform: translateY(-50%);
  font-size: 2rem;
  color: var(--color-gold-bright);
  font-family: var(--font-display);
}
.section-btn:active { opacity: 0.85; transform: scale(0.98); }
.section-btn__label {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-black);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-reversed-text);
}
.section-btn__sub {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-reversed-muted);
  margin-top: var(--space-1);
}

/* ── Record Strip ──────────────────────────── */
.record-strip {
  background: var(--color-sunken);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-3);
}
.record-strip__row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: var(--space-4);
}
.record-strip__label {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--color-ink-muted);
}
.record-strip__value {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: var(--weight-black);
  color: var(--color-ink);
  letter-spacing: 0.02em;
}
.record-strip__divider {
  height: 1px;
  background: var(--color-border);
  margin: var(--space-2) 0;
}
.record-strip__rs { color: var(--color-success); }
.record-strip__ra { color: var(--color-danger); }

/* ── Spring Results ────────────────────────── */
.results-row {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin-bottom: var(--space-3);
}
.results-stack {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}
.result-pill-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}
.result-pill-opp {
  font-family: var(--font-display);
  font-size: var(--text-md);
  font-weight: var(--weight-bold);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--color-ink-soft);
}
.result-pill {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: var(--weight-bold);
  letter-spacing: 0.06em;
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-sm);
  text-transform: uppercase;
  white-space: nowrap;
}
.result-pill--W {
  background: #E3F2E4;
  color: var(--color-success);
  border: 1px solid #A8D5AB;
}
.result-pill--L {
  background: #FDECEA;
  color: var(--color-danger);
  border: 1px solid #EFB2AF;
}
.result-pill--T {
  background: var(--color-sunken);
  color: var(--color-ink-muted);
  border: 1px solid var(--color-border);
}

/* ── Section Label ─────────────────────────── */
.section-label {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--color-ink-muted);
  margin-bottom: var(--space-2);
  padding-bottom: var(--space-1);
  border-bottom: 1px solid var(--color-border);
}

/* ── Player Row (list) ─────────────────────── */
.player-row {
  display: block;
  width: 100%;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-2);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all var(--transition-base);
  text-align: left;
  position: relative;
}
.player-row::after {
  content: '›';
  position: absolute;
  right: var(--space-3);
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.4rem;
  color: var(--color-ink-muted);
  font-family: var(--font-display);
}
.player-row:active { background: var(--color-sunken); transform: scale(0.99); }

.player-row__top {
  display: flex;
  align-items: baseline;
  gap: var(--space-2);
  margin-bottom: var(--space-1);
}
.player-row__number {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: var(--weight-black);
  color: var(--color-gold);
  letter-spacing: -0.02em;
  min-width: 2.2rem;
}
.player-row__name {
  font-family: var(--font-display);
  font-size: var(--text-md);
  font-weight: var(--weight-bold);
  color: var(--color-ink);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-right: 1.5rem;
}

/* Power rank badge */
.rank-badge {
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: var(--weight-bold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px var(--space-2);
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}
.rank-badge--ace { background: var(--color-ink); color: var(--color-gold-bright); }
.rank-badge--2   { background: var(--color-gold-tint); color: var(--color-gold); border: 1px solid var(--color-gold-border); }
.rank-badge--3   { background: var(--color-sunken); color: var(--color-ink-muted); border: 1px solid var(--color-border); }
.rank-badge--4   { background: var(--color-surface); color: var(--color-ink-faint); border: 1px solid var(--color-border); }

/* ── Stat Row (in player list row) ────────── */
.stat-chips {
  display: flex;
  gap: var(--space-3);
  flex-wrap: wrap;
}
.stat-chip {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.stat-chip__label {
  font-family: var(--font-body);
  font-size: 0.6875rem;
  font-weight: var(--weight-semibold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-ink-muted);
  line-height: 1.2;
}
.stat-chip__value {
  font-family: var(--font-display);
  font-size: var(--text-md);
  font-weight: var(--weight-bold);
  color: var(--color-ink);
  letter-spacing: 0.02em;
  line-height: 1.1;
}
.stat-chip__value--hot { color: var(--color-danger); }
.stat-chip__value--gold { color: var(--color-gold); }

/* ── Player Detail Page ────────────────────── */
.detail-hero {
  background: var(--color-reversed-bg);
  padding: var(--space-4);
  border-bottom: 2px solid var(--color-gold-border);
}
.detail-number {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-black);
  color: var(--color-gold-bright);
  letter-spacing: -0.02em;
  line-height: 1;
}
.detail-name {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-black);
  color: var(--color-reversed-text);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.05;
  margin-top: var(--space-1);
}
.detail-meta {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-reversed-muted);
  margin-top: var(--space-1);
}

/* Slash line */
.slash-line {
  display: flex;
  align-items: center;
  gap: 0;
  margin: var(--space-4) 0 var(--space-3);
}
.slash-stat {
  flex: 1;
  text-align: center;
  padding: var(--space-3) var(--space-2);
  border-radius: var(--radius-md);
}
.slash-stat__label {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--color-ink-muted);
}
.slash-stat__value {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-black);
  color: var(--color-ink);
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.slash-divider {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  color: var(--color-border-strong);
  font-weight: 300;
  flex-shrink: 0;
}

/* Stat cards grid */
.stat-card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}
.stat-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3);
  text-align: center;
}
.stat-card--highlight {
  background: var(--color-gold-tint);
  border-color: var(--color-gold-border);
}
.stat-card--danger {
  background: #FFF1F0;
  border-color: #EFB2AF;
}
.stat-card__label {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--color-ink-muted);
  margin-bottom: 2px;
}
.stat-card__value {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: var(--weight-black);
  color: var(--color-ink);
  letter-spacing: 0.01em;
  line-height: 1.1;
}
.stat-card--highlight .stat-card__value { color: var(--color-gold); }
.stat-card--danger .stat-card__value { color: var(--color-danger); }
.stat-card__sub {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  color: var(--color-ink-muted);
  margin-top: 1px;
}

/* Counting table */
.count-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-display);
  background: var(--color-surface);
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--color-border);
  margin-bottom: var(--space-3);
}
.count-table th {
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-ink-muted);
  padding: var(--space-2) var(--space-2);
  text-align: center;
  background: var(--color-sunken);
  border-bottom: 1px solid var(--color-border);
  font-family: var(--font-body);
}
.count-table td {
  font-size: var(--text-md);
  font-weight: var(--weight-bold);
  color: var(--color-ink);
  text-align: center;
  padding: var(--space-3) var(--space-2);
}

/* Spring trend badge */
.trend-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  background: var(--color-gold-tint);
  border: 1px solid var(--color-gold-border);
  border-radius: var(--radius-sm);
  padding: var(--space-1) var(--space-3);
  color: var(--color-gold);
  margin-bottom: var(--space-3);
}
.trend-badge__label {
  font-size: var(--text-xs);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-ink-muted);
}

.gold-rule {
  height: 2px;
  background: linear-gradient(90deg, var(--color-gold-border), transparent);
  border: none;
  margin: var(--space-4) 0 var(--space-3);
}

/* ── Login Overlay ──────────────────────────── */
#login-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--color-reversed-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-6);
}
#login-overlay.hidden { display: none; }
.login-wordmark {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-black);
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: var(--color-reversed-text);
  text-align: center;
  line-height: 1;
  margin-bottom: var(--space-1);
}
.login-eyebrow {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--color-gold-bright);
  text-align: center;
  margin-bottom: var(--space-6);
}
.login-box {
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}
.login-input {
  background: #2C2825;
  border: 1px solid #4A4540;
  border-radius: var(--radius-md);
  color: var(--color-reversed-text);
  font-family: var(--font-body);
  font-size: var(--text-lg);
  letter-spacing: 0.3em;
  text-align: center;
  min-height: 56px;
  padding: var(--space-3) var(--space-4);
  width: 100%;
  outline: none;
  transition: border-color 180ms;
}
.login-input:focus { border-color: var(--color-gold-bright); }
.login-input::placeholder { letter-spacing: 0.1em; color: #5A544E; }
.login-btn {
  background: var(--color-gold-bright);
  color: var(--color-ink);
  font-family: var(--font-display);
  font-size: var(--text-md);
  font-weight: var(--weight-black);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border: none;
  border-radius: var(--radius-md);
  min-height: 56px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 180ms;
}
.login-btn:active { opacity: 0.8; }
.login-error {
  font-family: var(--font-body);
  font-size: var(--text-sm);

// ── Login / Auth ────────────────────────────────────────────────────────────
(function initLogin() {
  const COOKIE_NAME = 'ww_auth';
  const PASSWORD    = 'tilt';
  const DAYS        = 30;

  function getCookie(name) {
    return document.cookie.split('; ').reduce((acc, c) => {
      const [k, v] = c.split('=');
      return k === name ? decodeURIComponent(v) : acc;
    }, null);
  }

  function setCookie(name, value, days) {
    const exp = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${exp}; path=/; SameSite=Lax`;
  }

  const overlay = document.getElementById('login-overlay');
  const input   = document.getElementById('login-input');
  const btn     = document.getElementById('login-btn');
  const err     = document.getElementById('login-error');

  // Already authenticated?
  if (getCookie(COOKIE_NAME) === 'ok') {
    overlay.classList.add('hidden');
    return;
  }

  function attempt() {
    if (input.value.trim().toLowerCase() === PASSWORD) {
      setCookie(COOKIE_NAME, 'ok', DAYS);
      overlay.classList.add('hidden');
    } else {
      err.textContent = 'Incorrect code. Try again.';
      input.value = '';
      input.focus();
    }
  }

  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  // Focus input on load
  setTimeout(() => input.focus(), 100);
})();

// ── State ───────────────────────────────────────────────────────────────────
let currentTeam   = null;
let currentSection= null; // 'batters' | 'pitchers'

// ── Navigation ──────────────────────────────────────────────────────────────
function navigate(view, params) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  window.scrollTo(0, 0);
  if (params) renderView(view, params);
}

function renderView(view, params) {
  if (view === 'team') renderTeam(params.teamKey);
  if (view === 'batters') renderBatters(params.teamKey);
  if (view === 'pitchers') renderPitchers(params.teamKey);
  if (view === 'player') renderPlayer(params.teamKey, params.type, params.idx);
}

// ── Formatters ──────────────────────────────────────────────────────────────
function fmtAvg(v)  { return v.toFixed(3).replace(/^0/, ''); }
function fmtPct(v)  {
  if (v === null || v === undefined) return '—';
  return Math.round(v * 100) + '%';
}
function fmtStat(v) { return v !== null && v !== undefined ? v : '—'; }
function rankLabel(r) {
  if (r === 1) return ['ACE', 'ace'];
  if (r === 2) return ['#2', '2'];
  if (r === 3) return ['#3', '3'];
  return ['#' + r, '4'];
}

// ── Render: Team Index ───────────────────────────────────────────────────────
(function renderIndex() {
  const list = document.getElementById('team-list');
  Object.entries(TEAMS).forEach(([key, team]) => {
    const isBcc = team.is_user_team;
    const btn = document.createElement('button');
    btn.className = 'block-btn' + (isBcc ? ' block-btn--bcc' : '');
    const record = `${team.fall_record || ''} Fall&nbsp;&nbsp;${team.spring_record || ''} Spring`;
    btn.innerHTML = `
      <div class="block-btn__label">${team.team}</div>
      <div class="block-btn__sub">${team.fall_record} Fall &nbsp;·&nbsp; ${team.spring_record} Spring</div>
    `;
    btn.onclick = () => navigate('team', { teamKey: key });
    list.appendChild(btn);
  });
})();

// ── Render: Team Overview ────────────────────────────────────────────────────
function renderTeam(key) {
  currentTeam = key;
  const team = TEAMS[key];
  document.getElementById('team-header-title').textContent = team.team_short;

  const fallRS = team.fall_rs, fallRA = team.fall_ra;
  const sprRS  = team.spr_rs,  sprRA  = team.spr_ra;
  const totalRS = fallRS + sprRS;
  const totalRA = fallRA + sprRA;
  const rd = totalRS - totalRA;
  const rdStr = rd >= 0 ? '+' + rd : String(rd);

  // Spring results — with opponent name, one pill per line
  let springHTML = '';
  if (team.spring_games && team.spring_games.length) {
    const pills = team.spring_games.map(g => {
      const oppLabel = g.opp_name && g.opp_name !== 'Unknown' ? g.opp_name : 'Opponent';
      const scoreStr = g.result === 'W'
        ? `W&nbsp;${g.bcc}–${g.opp}`
        : g.result === 'L'
        ? `L&nbsp;${g.bcc}–${g.opp}`
        : `T&nbsp;${g.bcc}–${g.opp}`;
      return `
        <div class="result-pill-row">
          <span class="result-pill result-pill--${g.result}">${scoreStr}</span>
          <span class="result-pill-opp">${oppLabel}</span>
        </div>`;
    }).join('');
    springHTML = `
      <div class="section-label mb-2">Spring 2026 Results</div>
      <div class="results-stack mb-2">${pills}</div>
    `;
  }

  const bccFlag = team.is_user_team ? '<span class="bcc-flag">Your Team</span>' : '';

  document.getElementById('team-content').innerHTML = `
    <div class="detail-hero">
      <div class="detail-number">${team.team_short}${bccFlag}</div>
      <div class="detail-name">${team.team}</div>
    </div>
    <div class="content">
      <div class="record-strip mb-3">
        <div class="record-strip__row">
          <span class="record-strip__label">Fall 2025</span>
          <span class="record-strip__value">${team.fall_record}</span>
        </div>
        <div class="record-strip__divider"></div>
        <div class="record-strip__row">
          <span class="record-strip__label">Spring 2026</span>
          <span class="record-strip__value">${team.spring_record}</span>
        </div>
        <div class="record-strip__divider"></div>
        <div class="record-strip__row">
          <span class="record-strip__label">RS / RA</span>
          <span class="record-strip__value">
            <span class="record-strip__rs">${totalRS}</span>
            &nbsp;/&nbsp;
            <span class="record-strip__ra">${totalRA}</span>
            &nbsp;
            <span style="font-size:var(--text-sm); color: var(--color-ink-muted)">(${rdStr})</span>
          </span>
        </div>
      </div>
      <button class="section-btn" onclick="navigate('batters', {teamKey:'${key}'})">
        <div class="section-btn__label">Batters</div>
        <div class="section-btn__sub">${team.batters.length} players · batting order</div>
      </button>
      <button class="section-btn" onclick="navigate('pitchers', {teamKey:'${key}'})">
        <div class="section-btn__label">Pitchers</div>
        <div class="section-btn__sub">${team.pitchers.length} pitchers · power ranked</div>
      </button>
      ${springHTML}
    </div>
  `;
}

// ── Render: Batters List ─────────────────────────────────────────────────────
function renderBatters(key) {
  currentTeam = key;
  currentSection = 'batters';
  const team = TEAMS[key];
  document.getElementById('batters-back-label').textContent = team.team_short;
  document.getElementById('batters-back-btn').onclick = () => navigate('team', {teamKey: key});

  const list = document.getElementById('batters-list');
  list.innerHTML = '';

  team.batters.forEach((b, idx) => {
    const hhVal  = b.HHpct !== null ? fmtPct(b.HHpct) : '—';
    const hhClass = (b.HHpct !== null && b.HHpct >= 0.30) ? 'stat-chip__value--hot' : '';
    const btn = document.createElement('button');
    btn.className = 'player-row';
    btn.innerHTML = `
      <div class="player-row__top">
        <span class="player-row__number">#${b.number}</span>
        <span class="player-row__name">${b.name}</span>
      </div>
      <div class="stat-chips">
        <div class="stat-chip">
          <span class="stat-chip__label">AVG</span>
          <span class="stat-chip__value">${fmtAvg(b.AVG)}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-chip__label">OBP</span>
          <span class="stat-chip__value">${fmtAvg(b.OBP)}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-chip__label">OPS</span>
          <span class="stat-chip__value">${fmtAvg(b.OPS)}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-chip__label">HH%</span>
          <span class="stat-chip__value ${hhClass}">${hhVal}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-chip__label">K%</span>
          <span class="stat-chip__value">${fmtPct(b.Kpct)}</span>
        </div>
      </div>
    `;
    btn.onclick = () => navigate('player', {teamKey: key, type: 'batter', idx});
    list.appendChild(btn);
  });
}

// ── Render: Pitchers List ────────────────────────────────────────────────────
function renderPitchers(key) {
  currentTeam = key;
  currentSection = 'pitchers';
  const team = TEAMS[key];
  document.getElementById('pitchers-back-label').textContent = team.team_short;
  document.getElementById('pitchers-back-btn').onclick = () => navigate('team', {teamKey: key});

  const list = document.getElementById('pitchers-list');
  list.innerHTML = '';

  team.pitchers.forEach((p, idx) => {
    const [rankTxt, rankClass] = rankLabel(p.power_rank);
    const fps = p.FPSpct !== null ? fmtPct(p.FPSpct) : '—';
    const btn = document.createElement('button');
    btn.className = 'player-row';
    btn.innerHTML = `
      <div class="player-row__top">
        <span class="player-row__number">#${p.number}</span>
        <span class="player-row__name">${p.name}</span>
        <span class="rank-badge rank-badge--${rankClass}">${rankTxt}</span>
      </div>
      <div class="stat-chips">
        <div class="stat-chip">
          <span class="stat-chip__label">ERA</span>
          <span class="stat-chip__value">${p.ERA.toFixed(2)}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-chip__label">WHIP</span>
          <span class="stat-chip__value">${p.WHIP.toFixed(2)}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-chip__label">K/9</span>
          <span class="stat-chip__value">${p.K9.toFixed(1)}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-chip__label">FPS%</span>
          <span class="stat-chip__value">${fps}</span>
        </div>
        <div class="stat-chip">
          <span class="stat-chip__label">IP</span>
          <span class="stat-chip__value">${p.IP}</span>
        </div>
      </div>
    `;
    btn.onclick = () => navigate('player', {teamKey: key, type: 'pitcher', idx});
    list.appendChild(btn);
  });
}

// ── Render: Player Detail ────────────────────────────────────────────────────
function renderPlayer(key, type, idx) {
  const team = TEAMS[key];
  const backLabel = team.team_short;
  const backSection = type === 'batter' ? 'batters' : 'pitchers';

  document.getElementById('player-back-label').textContent = type === 'batter' ? 'Batters' : 'Pitchers';
  document.getElementById('player-back-btn').onclick = () => navigate(backSection, {teamKey: key});

  if (type === 'batter') {
    const b = team.batters[idx];
    document.getElementById('player-header-title').textContent = '#' + b.number;

    // Spring trend
    let trendHTML = '';
    if (b.spr_AB >= 4 && b.spr_AVG !== null) {
      trendHTML = `
        <div class="trend-badge">
          <span class="trend-badge__label">Spring '26 · ${b.spr_AB} AB</span>
          &nbsp;
          AVG ${fmtAvg(b.spr_AVG)} &nbsp; OPS ${b.spr_OPS ? fmtAvg(b.spr_OPS) : '—'}
        </div>
      `;
    }

    const hhCardClass = (b.HHpct !== null && b.HHpct >= 0.30) ? 'stat-card--danger' : 'stat-card--highlight';
    const hhDisplay = b.HHpct !== null ? fmtPct(b.HHpct) : '—';
    const hhSub = b.BIP ? `${b.HardHit}/${b.BIP} BIP` : 'n/a';

    document.getElementById('player-content').innerHTML = `
      <div class="detail-hero">
        <div class="detail-number">#${b.number}</div>
        <div class="detail-name">${b.name}</div>
        <div class="detail-meta">${b.G} G &nbsp;·&nbsp; ${b.AB} AB</div>
      </div>
      <div class="content">
        ${trendHTML}

        <div class="slash-line">
          <div class="slash-stat">
            <div class="slash-stat__label">AVG</div>
            <div class="slash-stat__value">${fmtAvg(b.AVG)}</div>
          </div>
          <div class="slash-divider">/</div>
          <div class="slash-stat">
            <div class="slash-stat__label">OBP</div>
            <div class="slash-stat__value">${fmtAvg(b.OBP)}</div>
          </div>
          <div class="slash-divider">/</div>
          <div class="slash-stat">
            <div class="slash-stat__label">SLG</div>
            <div class="slash-stat__value">${fmtAvg(b.SLG)}</div>
          </div>
        </div>

        <div class="stat-card-grid">
          <div class="stat-card stat-card--highlight">
            <div class="stat-card__label">OPS</div>
            <div class="stat-card__value">${fmtAvg(b.OPS)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">K%</div>
            <div class="stat-card__value">${fmtPct(b.Kpct)}</div>
          </div>
          <div class="stat-card ${hhCardClass}">
            <div class="stat-card__label">Hard Hit %</div>
            <div class="stat-card__value">${hhDisplay}</div>
            <div class="stat-card__sub">${hhSub}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">BB</div>
            <div class="stat-card__value">${b.BB}</div>
            <div class="stat-card__sub">walks</div>
          </div>
        </div>

        <hr class="gold-rule">
        <div class="section-label mb-2">Counting Stats</div>
        <table class="count-table mb-4">
          <tr>
            <th>G</th><th>AB</th><th>R</th><th>H</th>
            <th>2B</th><th>3B</th><th>HR</th><th>RBI</th>
          </tr>
          <tr>
            <td>${b.G}</td><td>${b.AB}</td><td>${b.R}</td><td>${b.H}</td>
            <td>${b['2B']}</td><td>${b['3B']}</td><td>${b.HR}</td><td>${b.RBI}</td>
          </tr>
          <tr>
            <th>BB</th><th>SO</th><th>SB</th><th>HBP</th>
            <th colspan="4"></th>
          </tr>
          <tr>
            <td>${b.BB}</td><td>${b.SO}</td><td>${b.SB}</td><td>${b.HBP}</td>
            <td colspan="4"></td>
          </tr>
        </table>
      </div>
    `;

  } else {
    // Pitcher detail
    const p = team.pitchers[idx];
    document.getElementById('player-header-title').textContent = '#' + p.number;
    const [rankTxt] = rankLabel(p.power_rank);

    let trendHTML = '';
    if (p.spr_IP && p.spr_ERA !== null) {
      trendHTML = `
        <div class="trend-badge">
          <span class="trend-badge__label">Spring '26 · ${p.spr_IP} IP</span>
          &nbsp;
          ERA ${p.spr_ERA !== null ? p.spr_ERA.toFixed(2) : '—'}
        </div>
      `;
    }

    const fpsDisplay = p.FPSpct !== null ? fmtPct(p.FPSpct) : '—';
    const fpsSub = p.FPS_tot ? `${p.FPS_str}/${p.FPS_tot} PA` : 'n/a';
    const fpsCardClass = (p.FPSpct !== null && p.FPSpct >= 0.60) ? 'stat-card--highlight' : (p.FPSpct !== null && p.FPSpct < 0.45) ? 'stat-card--danger' : 'stat-card';

    document.getElementById('player-content').innerHTML = `
      <div class="detail-hero">
        <div class="detail-number">#${p.number}</div>
        <div class="detail-name">${p.name}</div>
        <div class="detail-meta">${rankTxt} &nbsp;·&nbsp; ${p.G} appearances</div>
      </div>
      <div class="content">
        ${trendHTML}

        <div class="stat-card-grid">
          <div class="stat-card stat-card--highlight">
            <div class="stat-card__label">ERA</div>
            <div class="stat-card__value">${p.ERA.toFixed(2)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">WHIP</div>
            <div class="stat-card__value">${p.WHIP.toFixed(2)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__label">K/9</div>
            <div class="stat-card__value">${p.K9.toFixed(1)}</div>
          </div>
          <div class="${fpsCardClass}">
            <div class="stat-card__label">FPS%</div>
            <div class="stat-card__value">${fpsDisplay}</div>
            <div class="stat-card__sub">${fpsSub}</div>
          </div>
        </div>

        <hr class="gold-rule">
        <div class="section-label mb-2">Volume</div>
        <table class="count-table mb-4">
          <tr>
            <th>IP</th><th>H</th><th>R</th><th>ER</th>
            <th>BB</th><th>SO</th>
          </tr>
          <tr>
            <td>${p.IP}</td><td>${p.H}</td><td>${p.R}</td><td>${p.ER}</td>
            <td>${p.BB}</td><td>${p.SO}</td>
          </tr>
        </table>
      </div>
    `;
  }
}
</script>
</body>
</html>
